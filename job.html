<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Job Posting</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 20px; /* ขนาดตัวหนังสือเริ่มต้น */
            margin: 0;
            padding: 0;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-nav {
            display: flex;
            width: 100%;
            background-color: #5A2E93;
            padding: 10px 0;
            justify-content: right;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .header-nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        .header-nav a:hover {
            text-decoration: underline;
        }

        .back-arrow {
            position: absolute; /* ใช้ตำแหน่งแบบ absolute */
            top: 85px; /* ระยะห่างจากขอบด้านบน */
            left: 80px; /* ระยะห่างจากขอบด้านซ้าย */
            display: inline-flex; /* ใช้สำหรับจัดวางไอคอนและข้อความ */
            align-items: center; /* จัดข้อความและไอคอนให้อยู่ตรงกลาง */
            gap: 0.5rem; /* ระยะห่างระหว่างไอคอนกับข้อความ */
            padding: 10px 16px; /* ขนาดของปุ่ม */
            font-size: 16px; /* ขนาดตัวอักษร */
            color: #605e5e; /* สีข้อความ */
            /*background-color: #FF6B00; /* สีพื้นหลังปุ่ม */
            border: none; /* ลบเส้นขอบ */
            border-radius: 8px; /* มุมโค้ง */
            text-decoration: none; /* ลบเส้นใต้ */
            cursor: pointer; /* เปลี่ยนเคอร์เซอร์เมื่อ hover */
            transition: all 0.3s ease; /* เพิ่มเอฟเฟกต์การเปลี่ยนแปลง */
        }

        .back-arrow:hover {
            /*background-color: #E65A00; /* เปลี่ยนสีเมื่อ hover */
            transform: scale(1.05); /* ขยายเล็กน้อยเมื่อ hover */
        }

        .back-arrow i {
            font-size: 2rem; /* ปรับขนาดไอคอน */
        }


        .container {
            width: 90%;
            max-width: 700px;
            padding: 20px;
            border-radius: 20px;
            background-color: white;
            /* box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); */
            margin-top: 120px;
        }

        .header-title {
            background-color: #ff8800;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 60px;
        }

        .form-group {
            display: flex;
            flex-direction: column; /* จัด layout ของ label และ input เป็นแนวตั้ง */
            margin-bottom: 3.5rem; /* เพิ่มช่องว่างระหว่างแต่ละฟอร์ม */
        }

        .form-group label {
            margin-bottom: 22px; /* เพิ่มช่องว่างระหว่าง label กับ input */
            font-weight: medium; /* เน้นหัวข้อ */
            text-align: left; /* จัดชิดซ้าย */
        }

        .form-group input, .form-group textarea, .form-group select {
            flex: 1; /* กำหนดให้ input ใช้พื้นที่ที่เหลือ */
            padding: 1rem;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            box-sizing: border-box;
            /*box-shadow: 0 0 0 3px rgba(255,107,0,0.1); */
            transition: box-shadow 0.3s ease;
            
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: orange;
            box-shadow: 0 0 0 3px rgba(255,107,0,0.1); /* เพิ่มเงาเข้มขึ้นเมื่อโฟกัส */
            outline: none; /* ลบเส้นขอบสีฟ้า */
        }

        .form-group textarea {
            min-height: 180px;
            resize: vertical;
        }

        .form-group .images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 4.5rem;
            margin-top: 1rem;
        }

        .form-group .images img {
            width: 180px; /* ความกว้าง */
            height: 140px; /* ความสูง */
            object-fit: cover; /* ปรับภาพให้พอดีกับกรอบ */
            border-radius: 8px; /* ทำมุมโค้งเล็กน้อย */
        }

        .form-group .images .add-photo {
            width: 180px; /* ความกว้าง */
            height: 135px; /* ความสูง */
            border: 2px dashed #E2E8F0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-group .images .add-photo:hover {
            border-color: #FF6B00;
            background-color: #F5F7FA;
        }

        .images {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .images img {
            width: 180px;
            height: 135px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
            transition: border-color 0.3s ease;
        }

        .images img:hover {
            border-color: orange;
        }

        .images img.selected {
            border-color: #FF6B00;
            box-shadow: 0 0 5px #FF6B00;
        }

        .add-photo {
            position: relative;
            width: 180px;
            height: 135px;
            border: 2px dashed #E2E8F0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-photo input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0; /* ซ่อน input */
            cursor: pointer;
        }

        .add-photo label {
            font-size: 2rem;
            color: #ccc;
            cursor: pointer;
        }

        .add-photo:hover {
            border-color: #FF6B00;
            background-color: #F5F7FA;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #FF6B00;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-container {
            position: relative;
        }

        .image-container:hover .delete-btn {
            opacity: 1; /* แสดงปุ่มลบเมื่อ hover */
        }


        .submit-btn {
            background-color: #ff8800;
            color: #fff;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            margin: 0 auto;
            display: block;
            margin-top: 3rem;
        }

        .submit-btn:hover {
            background-color: #e67600;
            transform: translateY(-2px); /* ยกปุ่มขึ้นเล็กน้อย */
            
        }

        .footer {
            width: 100%;
            background-color: #5A2E93;
            color: #fff;
            text-align: center;
            padding: 10px auto;
            bottom: 0;
            left: 0;
            font-size: 14px;
            margin-top: 4rem; /* เพิ่มระยะห่างด้านบนของ footer */
        }

        .footer img {
            height: 25px;
            vertical-align: middle;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 95%;
                margin-top: 120px;
            }

            .header-nav {
                justify-content: right; /* Center navigation on mobile */
                flex-wrap: wrap;
            }

            .header-nav a {
                font-size: 14px;
                margin: 0 10px;
            }

            .header-title {
                font-size: 20px;
            }

            .form-group {
                gap: 10px;
            }

            .form-group label {
                font-size: 14px;
            }

            .submit-btn {
                font-size: 14px;
                padding: 8px 16px;
            }

            .images img, .add-photo {
                width: 80px;
                height: 60px;
            }

            .back-arrow {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 18px;
                padding: 10px;
            }

            .form-group label {
                font-size: 12px;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                padding: 10px;
                font-size: 14px;
            }

            .submit-btn {
                font-size: 12px;
                padding: 6px 12px;
            }

            .images img, .add-photo {
                width: 70px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <header class="header-nav">
        <a href="#">เกี่ยวกับเรา</a>
        <a href="#">ข่าวสาร</a>
        <a href="#">เข้าสู่ระบบ</a>
    </header>
    <div>
        <a href="javascript:history.back()" class="back-arrow">
            <i class="bi bi-chevron-left"></i> 
        </a>
    </div>
    <div class="container">
        <div class="header-title">Job Posting</div>
        <form>
            <div class="form-group">
                <label for="job-name">Job Name/ชื่องาน</label>
                <input type="text" id="job-name" name="job-name" placeholder="">
            </div>

            <div class="form-group">
                <label for="job-details">Job Details/รายละเอียดงาน</label>
                <textarea id="job-details" name="job-details" placeholder=""></textarea>
            </div>

            <div class="form-group">
                <label for="job-category">Job Category/ประเภทงาน</label>
                <select id="job-category" name="job-category">
                    <option value=""></option>
                    <option value="Teaching Assistant">Teaching Assistant</option>
                    <option value="Mobile Application">Mobile Application</option>
                    <option value="Game Development">Game Development</option>
                    <option value="Chattbot">Chattbot</option>
                    <option value="Web Development">Web Development</option>
                    <option value="Research Assistant">Research Assistant</option>
                    <option value="Graphic Design">Graphic Design</option>
                    <option value="Data Science & AI">Data Science & AI</option>
                    <option value="Website Scraping">Website Scraping</option>
                    <option value="Desktop Application">Desktop Application</option>
                    <option value="UX/UI">UX/UI</option>
                    <option value="IOT Project">IOT Project</option>
                    <option value="IT Solution and Support">IT Solution and Support</option>
                    <option value="Data Labeling">Data Labeling</option>
                    <option value="Data Engineering">Data Engineering</option>
                    <option value="Wordpress">Wordpress</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cover photo/ภาพหน้าปกงาน</label>
                <div class="images">
                    <img src="photo/02.jpg" alt="Image 1">
                    <img src="photo/01.png" alt="Image 2">
                    <div class="add-photo">
                        <input type="file" id="upload-photo" accept="image/*" onchange="previewImage(event)">
                        <label for="upload-photo">+</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="vacancy">Student Count Required/จำนวนตำแหน่งที่ต้องการ</label>
                <input type="number" id="vacancy" name="vacancy" placeholder="">
            </div>

            <div class="form-group">
                <label for="job-name">Application Dateline/วันสิ้นสุดงาน</label>
                <input type="date" id="job-name" name="job-name" placeholder="">
            </div>

            <div class="form-group">
                <label for="job-category">Job Category/ผลตอบแทน</label>
                <select id="job-category" name="job-category">
                    <option value=""></option>
                    <option value="full-time">เงิน</option>
                    <option value="part-time">ชั่วโมงกิจกรรม</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Add Job</button>
        </form>
    </div>

    <footer class="footer">
        <p>&copy; 2024 CSIT | Faculty of Science and Technology</p>
    </footer>
    <script>
        function addImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // สร้าง container สำหรับรูปภาพ
                    const container = document.createElement('div');
                    container.classList.add('image-container');
    
                    // สร้าง element รูปภาพ
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.alt = "Uploaded Image";
                    img.onclick = () => selectImage(img); // คลิกเพื่อเลือก
                    container.appendChild(img);
    
                    // สร้างปุ่มลบ
                    const deleteBtn = document.createElement('button');
                    deleteBtn.classList.add('delete-btn');
                    deleteBtn.innerHTML = "&times;";
                    deleteBtn.onclick = () => container.remove(); // คลิกเพื่อลบรูป
                    container.appendChild(deleteBtn);
    
                    // เพิ่ม container ใน .images
                    document.querySelector('.images').appendChild(container);
                };
                reader.readAsDataURL(file);
            }
        }
    
        function selectImage(img) {
            // เพิ่ม/ลบคลาส selected
            const selected = document.querySelector('.images img.selected');
            if (selected) selected.classList.remove('selected');
            img.classList.add('selected');
        }
    </script>
    <script>
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.alt = "Uploaded Image";
                    img.style.width = "180px";
                    img.style.height = "135px";
                    img.style.objectFit = "cover";
                    img.style.borderRadius = "8px";
                    
                    const addPhoto = document.querySelector('.add-photo');
                    addPhoto.insertAdjacentElement('beforebegin', img);
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
    
    
    
    
</body>
</html>
